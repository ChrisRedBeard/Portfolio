name: Deploy to Vercel

# Deploya in produzione a ogni push su main (es. dopo il merge di una PR),
# oppure manualmente dalla tab "Actions" del repo.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Annulla un deploy in corso se ne parte uno nuovo sullo stesso ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Gate di qualità: se falliscono, il deploy NON parte ──
      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      # ── Deploy su Vercel (CLI) ──
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
